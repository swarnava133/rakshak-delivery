version: '3.8'

services:

  # ─── MySQL ───────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: rakshak-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_USER: rakshak
      MYSQL_PASSWORD: rakshak1234
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - rakshak-network

  # ─── Redis ───────────────────────────────────────────
  redis:
    image: redis:7.2
    container_name: rakshak-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - rakshak-network

  # ─── Zookeeper (Kafka needs this) ────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: rakshak-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - rakshak-network

  # ─── Kafka ───────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: rakshak-kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - rakshak-network

# ─── Volumes & Networks ──────────────────────────────
volumes:
  mysql-data:

networks:
  rakshak-network:
    driver: bridge